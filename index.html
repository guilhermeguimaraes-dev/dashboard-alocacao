<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InvestSmart · Painel Gerencial — Cards de Alocação</title>
<style>
  /* ============================================================
     PALETA DE MARCA — ajuste os HEX abaixo para o padrão exato da InvestSmart
     ============================================================ */
  :root{
    --bg:#eef1f6; --surface:#ffffff; --surface-2:#f7f9fc;
    --ink:#0e1f33; --text:#243b53; --muted:#627d98; --line:#dce3ed;
    --brand:#0b4a8f;            /* azul institucional principal */
    --brand-2:#1e6fd9;          /* azul de apoio / destaque       */
    --pos:#1b873f;              /* boletado / dentro do prazo      */
    --neg:#c0392b;              /* perdido / fora do prazo         */
    --warn:#b7791f;             /* parado                          */
    --info:#2563eb;             /* movimentado                     */
    --new:#6b46c1;              /* novo                            */
    --idle:#8095a8;             /* base / neutro                   */
    --pos-bg:#e7f4ec; --neg-bg:#fbeae8; --warn-bg:#fbf2e0; --info-bg:#e8effd; --new-bg:#efeafa;
    --radius:12px; --radius-sm:8px;
    --shadow:0 1px 2px rgba(14,31,51,.06),0 4px 16px rgba(14,31,51,.06);
    --font:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--font);
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
    font-variant-numeric:tabular-nums;
  }
  .num{font-variant-numeric:tabular-nums}
  h1,h2,h3{margin:0; color:var(--ink); font-weight:600; letter-spacing:-.01em}
  a{color:var(--brand-2)}

  /* ---------- Topbar ---------- */
  .topbar{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg,#0e1f33,#0a1830);
    color:#fff; padding:14px 22px; display:flex; align-items:center; gap:16px;
    box-shadow:0 2px 12px rgba(10,24,48,.25);
  }
  .topbar .logo{
    font-weight:700; font-size:17px; letter-spacing:.02em; color:#fff;
    display:flex; align-items:center; gap:9px; white-space:nowrap;
  }
  .topbar .logo .dot{width:10px;height:10px;border-radius:3px;background:var(--brand-2);box-shadow:0 0 0 3px rgba(30,111,217,.25)}
  .topbar .sub{color:#b9c6d8; font-size:13px; font-weight:400}
  .topbar .meta{margin-left:auto; text-align:right; font-size:12px; color:#9fb0c6; line-height:1.5}
  .topbar .meta b{color:#e7eefa; font-weight:600}

  /* ---------- Filtros ---------- */
  .filters{
    position:sticky; top:54px; z-index:20; background:var(--surface);
    border-bottom:1px solid var(--line); padding:12px 22px;
    display:flex; flex-wrap:wrap; gap:12px 16px; align-items:flex-end;
  }
  .field{display:flex; flex-direction:column; gap:4px; min-width:150px}
  .field label{font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600}
  .field select,.field input{
    font-family:inherit; font-size:13px; color:var(--text); background:var(--surface-2);
    border:1px solid var(--line); border-radius:var(--radius-sm); padding:8px 10px; min-height:36px;
  }
  .field select:focus,.field input:focus{outline:2px solid var(--brand-2); outline-offset:1px; border-color:var(--brand-2)}
  .field.search{min-width:230px; flex:1}
  .toggle{display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text); padding-bottom:8px; cursor:pointer; user-select:none}
  .toggle input{width:16px;height:16px;accent-color:var(--brand)}
  .btn-reset{
    margin-left:auto; align-self:flex-end; background:var(--surface-2); border:1px solid var(--line);
    color:var(--text); font-family:inherit; font-size:13px; font-weight:600; padding:9px 14px;
    border-radius:var(--radius-sm); cursor:pointer; min-height:36px;
  }
  .btn-reset:hover{background:#eef2f8; border-color:#c7d2e0}
  .scope-tag{
    font-size:12px; color:var(--muted); align-self:flex-end; padding-bottom:9px;
  }
  .scope-tag b{color:var(--brand)}

  /* ---------- Layout ---------- */
  .wrap{padding:20px 22px 60px; max-width:1480px; margin:0 auto}
  .panel{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:18px 20px; margin-bottom:18px;
  }
  .panel h2{font-size:15px; margin-bottom:2px}
  .panel .hint{color:var(--muted); font-size:12.5px; margin:2px 0 14px}
  .panel-head{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap}

  /* ---------- KPIs ---------- */
  .kpi-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(168px,1fr)); gap:12px; margin-bottom:18px}
  .kpi{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 15px; box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .kpi::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--brand)}
  .kpi.pos::before{background:var(--pos)} .kpi.neg::before{background:var(--neg)}
  .kpi.warn::before{background:var(--warn)} .kpi.info::before{background:var(--info)}
  .kpi .k-label{font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; font-weight:600}
  .kpi .k-value{font-size:25px; font-weight:700; color:var(--ink); margin-top:6px; line-height:1.1}
  .kpi .k-value.sm{font-size:20px}
  .kpi .k-foot{font-size:12px; color:var(--muted); margin-top:4px}
  .kpi .k-foot strong{color:var(--text); font-weight:600}

  /* ---------- Chips de movimentação ---------- */
  .mov-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px}
  .mov{border:1px solid var(--line); border-radius:var(--radius-sm); padding:11px 13px; background:var(--surface-2)}
  .mov .m-top{display:flex; align-items:center; gap:7px; font-size:12px; font-weight:600; color:var(--text)}
  .mov .m-dot{width:9px;height:9px;border-radius:50%}
  .mov .m-num{font-size:22px; font-weight:700; color:var(--ink); margin-top:3px}
  .d-new{background:var(--new)} .d-mov{background:var(--info)} .d-par{background:var(--warn)}
  .d-bol{background:var(--pos)} .d-per{background:var(--neg)} .d-sai{background:var(--idle)}

  /* ---------- Barras SVG ---------- */
  .bars{width:100%}
  .bar-row{display:grid; grid-template-columns:190px 1fr 92px; align-items:center; gap:10px; margin:7px 0}
  .bar-row .b-name{font-size:13px; color:var(--text); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .bar-track{background:var(--surface-2); border-radius:6px; height:22px; overflow:hidden; position:relative; border:1px solid var(--line)}
  .bar-fill{height:100%; border-radius:6px 0 0 6px; transition:width .4s ease}
  .bar-row .b-val{font-size:12.5px; color:var(--muted); text-align:left; white-space:nowrap}
  .bar-row .b-val b{color:var(--text); font-weight:600}

  /* ---------- Tabelas ---------- */
  .tbl-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius-sm)}
  table{border-collapse:collapse; width:100%; font-size:13px}
  thead th{
    background:var(--surface-2); color:var(--muted); text-align:left; font-weight:600;
    font-size:11.5px; text-transform:uppercase; letter-spacing:.03em; padding:10px 12px;
    border-bottom:1px solid var(--line); position:sticky; top:0; white-space:nowrap; cursor:pointer; user-select:none;
  }
  thead th.no-sort{cursor:default}
  thead th .arw{opacity:.35; margin-left:3px; font-size:10px}
  thead th.sorted .arw{opacity:1; color:var(--brand)}
  tbody td{padding:9px 12px; border-bottom:1px solid #eef2f7; vertical-align:top}
  tbody tr:hover{background:#f9fbfe}
  td.r{text-align:right; white-space:nowrap}
  td.c{text-align:center}
  .pill{display:inline-block; padding:2px 8px; border-radius:999px; font-size:11.5px; font-weight:600; white-space:nowrap}
  .pill.pos{background:var(--pos-bg); color:#15692f}
  .pill.neg{background:var(--neg-bg); color:#9e2b1f}
  .pill.warn{background:var(--warn-bg); color:#8a5b12}
  .pill.info{background:var(--info-bg); color:#1d50c4}
  .pill.new{background:var(--new-bg); color:#553aa3}
  .pill.idle{background:#eef2f7; color:#5b7186}
  .desc-cell{max-width:360px}
  .desc-cell details summary{cursor:pointer; color:var(--text); list-style:none}
  .desc-cell details summary::-webkit-details-marker{display:none}
  .desc-cell .preview{display:block; color:var(--text)}
  .desc-cell .more{font-size:12px; color:var(--brand-2); font-weight:600}
  .desc-cell .full{margin-top:6px; color:var(--muted); white-space:pre-wrap; font-size:12.5px}
  .muted{color:var(--muted)}
  .strong{font-weight:600;color:var(--text)}
  .nowrap{white-space:nowrap}
  .empty-state{padding:60px 20px; text-align:center; color:var(--muted)}
  .empty-state h2{color:var(--ink); margin-bottom:8px}

  .legend{display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--muted); margin-top:10px}
  .legend span{display:inline-flex; align-items:center; gap:6px}
  .legend i{width:11px;height:11px;border-radius:3px; display:inline-block}

  .table-meta{font-size:12px; color:var(--muted); margin:10px 2px 0}

  @media (max-width:860px){
    .topbar .meta{display:none}
    .bar-row{grid-template-columns:120px 1fr 78px}
    .filters{top:50px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important}
  }
</style>
</head>

const fmtBRL = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const fmtBRL2 = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2});
const fmtInt = new Intl.NumberFormat('pt-BR');
const pct = (n,d)=> d>0 ? (100*n/d) : 0;
const fpct = (v)=> (v).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
const el = (tag,cls,txt)=>{const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e;};
function fmtData(s){
  if(!s) return '—';
  const d = new Date(s.replace(' ','T'));
  if(isNaN(d)) return s;
  const p=n=>String(n).padStart(2,'0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtDiaCurto(s){ // 'YYYY-MM-DD' -> 'DD/MM'
  if(!s) return '';
  const [y,m,d]=s.split('-'); return `${d}/${m}`;
}

/* Mapa de classificações de movimento -> rótulo + classe de cor */
const MOV = {

};
/* Estágios considerados terminais */
const TERMINAIS = new Set(['Boletado','Perdido']);

/* ----------------------- Estado / filtros ----------------------- */
const state = { gerente:'', investor:'', estagio:'', mov:'', busca:'', soParados:false, sort:{key:'receita_estimada',dir:-1}, rankSort:{key:'total',dir:-1} };

function investorsDoGerente(g){
  const set = new Set();
  DADOS.cards.forEach(c=>{ if(!g || c.gerente===g) set.add(c.investor); });
  return [...set].filter(Boolean).sort((a,b)=>a.localeCompare(b,'pt-BR'));
}

function aplicaFiltros(){
  const q = state.busca.trim().toLowerCase();
  return DADOS.cards.filter(c=>{
    if(state.gerente && c.gerente!==state.gerente) return false;
    if(state.investor && c.investor!==state.investor) return false;
    if(state.estagio && c.estagio!==state.estagio) return false;
    if(state.mov && c.movimento!==state.mov) return false;
    if(state.soParados && c.tocado) return false;
    if(q){
      const blob = `${c.id} ${c.investor} ${c.gerente} ${c.assessor} ${c.descricao} ${c.estagio}`.toLowerCase();
      if(!blob.includes(q)) return false;
    }
    return true;
  });
}

/* ----------------------- Cálculo de métricas ----------------------- */
function metricas(cards){
  const m = {
    total:cards.length, tocados:0, naoTocados:0,
    boletados:0, perdidos:0, andamento:0,
    receitaEst:0, receitaReal:0, qtdClientes:0,
    slaOk:0, slaTotal:0,
    estagios:{}, motivos:{}, mov:{NOVO:0,MOVIMENTADO:0,PARADO:0,BOLETADO:0,PERDIDO:0},
  };
  cards.forEach(c=>{
    if(c.tocado) m.tocados++; else m.naoTocados++;
    if(c.estagio==='Boletado') m.boletados++;
    else if(c.estagio==='Perdido') m.perdidos++;
    else m.andamento++;
    m.receitaEst += (c.receita_estimada||0);
    m.receitaReal += (c.receita_realizada||0);
    m.qtdClientes += (c.qtd_clientes||0);
    m.estagios[c.estagio] = (m.estagios[c.estagio]||0)+1;
    if(c.estagio==='Perdido' && c.motivo_perda){ m.motivos[c.motivo_perda]=(m.motivos[c.motivo_perda]||0)+1; }
    if(c.sla_status){ m.slaTotal++; if(c.sla_ok) m.slaOk++; }
    if(m.mov[c.movimento]!=null) m.mov[c.movimento]++;
  });
  m.encerrados = m.boletados + m.perdidos;
  return m;
}

    k.appendChild(el('div','k-label',label));
    const v=el('div','k-value'+(small?' sm':'')); v.textContent=value; k.appendChild(v);
    if(foot){ const f=el('div','k-foot'); f.innerHTML=foot; k.appendChild(f); }
    return k;
  };
  grid.appendChild(kpi('Cards no escopo', fmtInt.format(m.total),
    `<strong>${m.andamento}</strong> em andamento · <strong>${m.encerrados}</strong> encerrados`));
  grid.appendChild(kpi('Engajamento do investor', fpct(pct(m.tocados,m.total)),
    `<strong>${m.tocados}</strong> trabalhados · <strong>${m.naoTocados}</strong> na fila`, m.naoTocados>0?'warn':'pos'));
  grid.appendChild(kpi('Taxa de boletagem', fpct(pct(m.boletados, m.encerrados||1)),
    `<strong>${m.boletados}</strong> boletados · base: encerrados`, 'pos'));
  grid.appendChild(kpi('Taxa de perda', fpct(pct(m.perdidos, m.encerrados||1)),
    `<strong>${m.perdidos}</strong> perdidos`, m.perdidos>0?'neg':null));
  grid.appendChild(kpi('Não trabalhados', fmtInt.format(m.naoTocados),
    `cards ainda parados na fila inicial`, m.naoTocados>0?'warn':'pos'));
  grid.appendChild(kpi('Receita estimada', fmtBRL.format(m.receitaEst),
    `pipeline total no escopo`, 'info', true));
  grid.appendChild(kpi('Receita realizada', fmtBRL.format(m.receitaReal),
    `<strong>${m.qtdClientes}</strong> clientes realizados`, 'pos', true));
  grid.appendChild(kpi('% de realização', fpct(pct(m.receitaReal, m.receitaEst||1)),
    `realizada ÷ estimada`, null, true));
  if(m.slaTotal>0){
    grid.appendChild(kpi('SLA dentro do prazo', fpct(pct(m.slaOk,m.slaTotal)),
      `<strong>${m.slaOk}</strong> de ${m.slaTotal} avaliados`, m.slaOk===m.slaTotal?'pos':'warn'));
  }
  host.appendChild(grid);
}

/* ----------------------- Render: barras genéricas ----------------------- */
function barChart(host, rows, opt={}){
  // rows: [{name, value, color, sub}]
  const max = Math.max(1, ...rows.map(r=>r.value));
  const box = el('div','bars');
  rows.forEach(r=>{
    const row = el('div','bar-row');
    row.appendChild(el('div','b-name',r.name));
    const track = el('div','bar-track');
    const fill = el('div','bar-fill');
    fill.style.width = (100*r.value/max)+'%';
    fill.style.background = r.color || 'var(--brand)';
    track.appendChild(fill);
    row.appendChild(track);
    const val = el('div','b-val'); val.innerHTML = r.sub || `<b>${fmtInt.format(r.value)}</b>`;
    row.appendChild(val);
    box.appendChild(row);
  });
  host.appendChild(box);
}

/* ----------------------- Render: evolução (linha SVG) ----------------------- */
function renderEvolucao(host){
  const h = DADOS.historico||[];
  if(h.length<2) return;
  const p = el('div','panel');
  p.appendChild(el('h2','','Evolução do funil'));
  p.appendChild(el('div','hint','Acúmulo diário a partir das extrações. Linhas: cards em andamento, boletados e perdidos.'));
  const W=920,H=240,padL=44,padR=14,padT=16,padB=28;
  const xs = h.map((_,i)=> padL + (W-padL-padR)*(h.length===1?0:i/(h.length-1)));
  const maxY = Math.max(1,...h.map(d=>Math.max(d.andamento,d.boletados,d.perdidos)));
  const y = v=> padT + (H-padT-padB)*(1 - v/maxY);
  const series=[
    {key:'andamento',color:'var(--info)',label:'Em andamento'},
    {key:'boletados',color:'var(--pos)',label:'Boletados'},
    {key:'perdidos',color:'var(--neg)',label:'Perdidos'},
  ];
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.setAttribute('width','100%'); svg.setAttribute('role','img');
  // gridlines
  for(let g=0;g<=4;g++){
    const yy=padT+(H-padT-padB)*g/4;
    const ln=document.createElementNS(ns,'line');
    ln.setAttribute('x1',padL); ln.setAttribute('x2',W-padR); ln.setAttribute('y1',yy); ln.setAttribute('y2',yy);
    ln.setAttribute('stroke','#e7edf4'); ln.setAttribute('stroke-width','1'); svg.appendChild(ln);
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',padL-8); t.setAttribute('y',yy+4); t.setAttribute('text-anchor','end');
    t.setAttribute('font-size','10'); t.setAttribute('fill','#90a2b8');
    t.textContent=Math.round(maxY*(1-g/4)); svg.appendChild(t);
  }
  // x labels
  h.forEach((d,i)=>{
    if(h.length>8 && i%Math.ceil(h.length/8)!==0 && i!==h.length-1) return;
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',xs[i]); t.setAttribute('y',H-9); t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','10'); t.setAttribute('fill','#90a2b8');
    t.textContent=fmtDiaCurto(d.data); svg.appendChild(t);
  });
  series.forEach(s=>{
    let dpath='';
    h.forEach((d,i)=>{ dpath += (i===0?'M':'L')+xs[i]+','+y(d[s.key]||0)+' '; });
    const path=document.createElementNS(ns,'path');
    path.setAttribute('d',dpath); path.setAttribute('fill','none');
    path.setAttribute('stroke',s.color); path.setAttribute('stroke-width','2.2');
    path.setAttribute('stroke-linejoin','round'); path.setAttribute('stroke-linecap','round'); svg.appendChild(path);
    h.forEach((d,i)=>{ const c=document.createElementNS(ns,'circle');
      c.setAttribute('cx',xs[i]); c.setAttribute('cy',y(d[s.key]||0)); c.setAttribute('r','3');
      c.setAttribute('fill',s.color); svg.appendChild(c); });
  });
  p.appendChild(svg);
  const leg=el('div','legend');
  series.forEach(s=>{ const sp=el('span'); const ic=el('i'); ic.style.background=s.color; sp.appendChild(ic); sp.appendChild(el('span',null,s.label)); leg.appendChild(sp); });
  p.appendChild(leg);
  host.appendChild(p);
}

/* ----------------------- Render: ranking de investors ----------------------- */
function renderRanking(host, cards){
  const p = el('div','panel');
  p.appendChild(el('h2','','Ranking por investor'));
  p.appendChild(el('div','hint','Engajamento, conversão e receita por responsável (ASSIGNED_BY_NAME). Clique nos títulos para ordenar.'));
  // agrega
  const map={};
  cards.forEach(c=>{
    const k=c.investor||'(sem investor)';
    (map[k] ??= {investor:k, gerente:c.gerente||'—', total:0, tocados:0, andamento:0, boletados:0, perdidos:0, receita_estimada:0, receita_realizada:0});
    const r=map[k]; r.total++; if(c.tocado)r.tocados++;
    if(c.estagio==='Boletado')r.boletados++; else if(c.estagio==='Perdido')r.perdidos++; else r.andamento++;
    r.receita_estimada+=(c.receita_estimada||0); r.receita_realizada+=(c.receita_realizada||0);
  });
  let rows=Object.values(map).map(r=>({...r,
    engaj: pct(r.tocados,r.total),
    conv: pct(r.boletados, (r.boletados+r.perdidos)||1),
    naoTrab: r.total-r.tocados,
  }));
  const sk=state.rankSort;
  rows.sort((a,b)=>{ const va=a[sk.key], vb=b[sk.key];
    if(typeof va==='string') return sk.dir*va.localeCompare(vb,'pt-BR');
    return sk.dir*((va||0)-(vb||0)); });

  const cols=[
    {k:'investor',t:'Investor',cls:''},
    {k:'gerente',t:'Gerente',cls:''},
    {k:'total',t:'Cards',cls:'r'},
    {k:'engaj',t:'Engaj.',cls:'r'},
    {k:'naoTrab',t:'Na fila',cls:'r'},
    {k:'andamento',t:'Andam.',cls:'r'},
    {k:'boletados',t:'Bolet.',cls:'r'},
    {k:'perdidos',t:'Perd.',cls:'r'},
    {k:'conv',t:'Conv.',cls:'r'},
    {k:'receita_estimada',t:'Rec. estimada',cls:'r'},
    {k:'receita_realizada',t:'Rec. realizada',cls:'r'},
  ];
  const wrap=el('div','tbl-wrap'); const tbl=document.createElement('table');
  const thead=document.createElement('thead'); const htr=document.createElement('tr');
  cols.forEach(col=>{ const th=document.createElement('th'); if(col.cls==='r')th.classList.add('r');
    th.textContent=col.t; if(sk.key===col.k)th.classList.add('sorted');
    const ar=el('span','arw',sk.key===col.k?(sk.dir<0?'▼':'▲'):'↕'); th.appendChild(ar);
    th.onclick=()=>{ state.rankSort = (sk.key===col.k)?{key:col.k,dir:-sk.dir}:{key:col.k,dir:-1}; render(); };
    htr.appendChild(th); });
  thead.appendChild(htr); tbl.appendChild(thead);
  const tb=document.createElement('tbody');
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    tr.appendChild(td(r.investor,'strong'));
    tr.appendChild(td(r.gerente,'muted'));
    tr.appendChild(td(fmtInt.format(r.total),'r'));
    tr.appendChild(tdPill(fpct(r.engaj), r.engaj>=70?'pos':(r.engaj>=40?'warn':'neg'),'r'));
    tr.appendChild(td(fmtInt.format(r.naoTrab),'r'+(r.naoTrab>0?' ':''))); 
    tr.appendChild(td(fmtInt.format(r.andamento),'r'));
    tr.appendChild(td(fmtInt.format(r.boletados),'r'));
    tr.appendChild(td(fmtInt.format(r.perdidos),'r'));
    tr.appendChild(td(fpct(r.conv),'r muted'));
    tr.appendChild(td(fmtBRL.format(r.receita_estimada),'r'));
    tr.appendChild(td(r.receita_realizada>0?fmtBRL2.format(r.receita_realizada):'—','r'+(r.receita_realizada>0?' strong':' muted')));
    tb.appendChild(tr);
  });
  tbl.appendChild(tb); wrap.appendChild(tbl); p.appendChild(wrap);
  host.appendChild(p);
}
function td(txt,cls){ const d=document.createElement('td'); if(cls)d.className=cls; d.textContent=txt; return d; }
function tdPill(txt,cls,extra){ const d=document.createElement('td'); if(extra)d.className=extra; const s=el('span','pill '+cls,txt); d.appendChild(s); return d; }

/* ----------------------- Render: motivos de perda ----------------------- */
function renderMotivos(host,m){
  const ms=Object.entries(m.motivos).filter(([k])=>k && k!=='não selecionada').sort((a,b)=>b[1]-a[1]);
  if(!ms.length) return;
  const p=el('div','panel');
  p.appendChild(el('h2','','Motivos de perda'));
  p.appendChild(el('div','hint','Subcategorias dos cards perdidos no escopo (UF_CRM_263_BKP_SUBCATEGORIA_PERDA).'));
  const tot=ms.reduce((s,[,v])=>s+v,0);
  barChart(p, ms.map(([k,v])=>({name:k, value:v, color:'var(--neg)',
    sub:`<b>${v}</b> &nbsp;<span class="muted">${fpct(pct(v,tot))}</span>`})));
  host.appendChild(p);
}

/* ----------------------- Render: tabela detalhada ----------------------- */
function renderTabela(host, cards){
  const p=el('div','panel');
  const head=el('div','panel-head');
  const left=el('div'); left.appendChild(el('h2','','Cards detalhados'));
  left.appendChild(el('div','hint','Visão linha a linha. Clique nos títulos para ordenar; abra a descrição em “ver mais”.'));
  head.appendChild(left); p.appendChild(head);

  const sk=state.sort;
  const sorted=[...cards].sort((a,b)=>{ const va=a[sk.key], vb=b[sk.key];
    if(va==null&&vb==null) return 0; if(va==null) return 1; if(vb==null) return -1;
    if(typeof va==='string') return sk.dir*va.localeCompare(vb,'pt-BR');
    return sk.dir*((va||0)-(vb||0)); });

  const cols=[
    {k:'id',t:'ID',cls:''},
    {k:'investor',t:'Investor',cls:''},
    {k:'gerente',t:'Gerente',cls:''},
    {k:'assessor',t:'Assessor',cls:''},
    {k:'estagio',t:'Estágio',cls:''},
    {k:'movimento',t:'Movim.',cls:''},
    {k:'dias_parado',t:'Dias parado',cls:'r'},
    {k:'receita_estimada',t:'Rec. estimada',cls:'r'},
    {k:'receita_realizada',t:'Rec. realizada',cls:'r'},
    {k:'descricao',t:'Descrição',cls:'no-sort'},
  ];
  const wrap=el('div','tbl-wrap'); const tbl=document.createElement('table');
  const thead=document.createElement('thead'); const htr=document.createElement('tr');
  cols.forEach(col=>{ const th=document.createElement('th'); if(col.cls)th.className=col.cls;
    th.textContent=col.t;
    if(col.k!=='descricao'){
      if(sk.key===col.k)th.classList.add('sorted');
      const ar=el('span','arw',sk.key===col.k?(sk.dir<0?'▼':'▲'):'↕'); th.appendChild(ar);
      th.onclick=()=>{ state.sort=(sk.key===col.k)?{key:col.k,dir:-sk.dir}:{key:col.k,dir:-1}; render(); };
    }
    htr.appendChild(th); });
  thead.appendChild(htr); tbl.appendChild(thead);

  const tb=document.createElement('tbody');
  sorted.forEach(c=>{
    const tr=document.createElement('tr');
    tr.appendChild(td(c.id,'nowrap muted'));
    tr.appendChild(td(c.investor||'—','strong'));
    tr.appendChild(td(c.gerente||'—','muted'));
    tr.appendChild(td(c.assessor||'—',''));
    // estágio pill
    const estCls = c.estagio==='Boletado'?'pos':(c.estagio==='Perdido'?'neg':(c.estagio==='Novas Solicitações'?'warn':'info'));
    tr.appendChild(tdPill(c.estagio, estCls));
    // movimento pill
    const mv=MOV[c.movimento]||MOV.BASE;
    tr.appendChild(tdPill(mv.label, mv.cls));
    // dias parado
    const dp=document.createElement('td'); dp.className='r';
    dp.textContent = (c.dias_parado!=null)? c.dias_parado : '—';
    if(c.dias_parado!=null && c.dias_parado>=3 && !TERMINAIS.has(c.estagio)) dp.classList.add('strong');
    tr.appendChild(dp);
    tr.appendChild(td(fmtBRL.format(c.receita_estimada||0),'r'));
    tr.appendChild(td(c.receita_realizada>0?fmtBRL2.format(c.receita_realizada):'—','r'+(c.receita_realizada>0?' strong':' muted')));
    // descrição
    const dtd=document.createElement('td'); dtd.className='desc-cell';
    const full=(c.descricao||'').trim();
    if(full.length>90){
      const det=document.createElement('details');
      const sum=document.createElement('summary');
      sum.appendChild(el('span','preview', full.slice(0,90)+'… '));
      sum.appendChild(el('span','more','ver mais'));
      det.appendChild(sum);
      det.appendChild(el('div','full', full));
      dtd.appendChild(det);
    } else { dtd.appendChild(el('span','preview', full||'—')); }
    if(c.estagio==='Perdido' && c.motivo_perda && c.motivo_perda!=='não selecionada'){
      const mp=el('div','full'); mp.textContent='Motivo: '+c.motivo_perda; dtd.appendChild(mp);
    }
    tr.appendChild(dtd);
    tb.appendChild(tr);
  });
  tbl.appendChild(tb); wrap.appendChild(tbl); p.appendChild(wrap);
  p.appendChild(el('div','table-meta', `${sorted.length} card(s) no escopo atual.`));
  host.appendChild(p);
}

/* ----------------------- Filtros UI ----------------------- */
function preencheSelect(sel, valores, rotuloTodos){
  sel.innerHTML='';
  const opt0=document.createElement('option'); opt0.value=''; opt0.textContent=rotuloTodos; sel.appendChild(opt0);
  valores.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
}
function initFiltros(){
  const gerentes=[...new Set(DADOS.cards.map(c=>c.gerente).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  const estagios=[...ORDEM_ESTAGIO.filter(s=>DADOS.cards.some(c=>c.estagio===s)), ...new Set(DADOS.cards.map(c=>c.estagio).filter(s=>!ORDEM_ESTAGIO.includes(s)))];
  const movs=['NOVO','MOVIMENTADO','PARADO','BOLETADO','PERDIDO'].filter(k=>DADOS.cards.some(c=>c.movimento===k));

  preencheSelect(document.getElementById('fGerente'), gerentes, 'Todos os gerentes');
  preencheSelect(document.getElementById('fInvestor'), investorsDoGerente(''), 'Todos os investors');
  preencheSelect(document.getElementById('fEstagio'), estagios, 'Todos os estágios');
  preencheSelect(document.getElementById('fMov'), movs.map(k=>k), 'Qualquer movimentação');
  // ajusta rótulos legíveis no select de movimento
  [...document.getElementById('fMov').options].forEach(o=>{ if(o.value && MOV[o.value]) o.textContent=MOV[o.value].label; });

  document.getElementById('fGerente').onchange=e=>{ state.gerente=e.target.value; state.investor='';
    preencheSelect(document.getElementById('fInvestor'), investorsDoGerente(state.gerente), 'Todos os investors'); render(); };
  document.getElementById('fInvestor').onchange=e=>{ state.investor=e.target.value; render(); };
  document.getElementById('fEstagio').onchange=e=>{ state.estagio=e.target.value; render(); };
  document.getElementById('fMov').onchange=e=>{ state.mov=e.target.value; render(); };
  document.getElementById('fParados').onchange=e=>{ state.soParados=e.target.checked; render(); };
  let t; document.getElementById('fBusca').oninput=e=>{ clearTimeout(t); t=setTimeout(()=>{ state.busca=e.target.value; render(); },180); };
  document.getElementById('btnReset').onclick=()=>{
    state.gerente=state.investor=state.estagio=state.mov=state.busca=''; state.soParados=false;
    document.getElementById('fGerente').value=''; document.getElementById('fEstagio').value='';
    document.getElementById('fMov').value=''; document.getElementById('fBusca').value=''; document.getElementById('fParados').checked=false;
    preencheSelect(document.getElementById('fInvestor'), investorsDoGerente(''), 'Todos os investors');
    render();
  };
}

/* ----------------------- Render principal ----------------------- */
function render(){
  // meta topo
  const meta=DADOS.meta;
  document.getElementById('topMeta').innerHTML =
    `Extração: <b>${meta.snapshot_atual?fmtDiaCurto(meta.snapshot_atual):'—'}</b> &nbsp;·&nbsp; Gerado em <b>${meta.gerado_em||'—'}</b><br>`+
    `${fmtInt.format(DADOS.cards.length)} cards · ${meta.total_snapshots||0} extração(ões) no histórico`;

  const main=document.getElementById('main'); main.innerHTML='';

  if(!DADOS.cards.length){
    const es=el('div','empty-state');
    es.appendChild(el('h2','','Nenhum dado carregado'));
    es.appendChild(el('div',null,'Rode o script atualizar_dashboard.py com a extração do Bitrix na pasta para preencher este painel.'));
    main.appendChild(es); return;
  }

  const cards=aplicaFiltros();
  const m=metricas(cards);

  // tag de escopo
  const partes=[];
  if(state.gerente)partes.push(`Gerente: <b>${state.gerente}</b>`);
  if(state.investor)partes.push(`Investor: <b>${state.investor}</b>`);
  if(state.estagio)partes.push(`Estágio: <b>${state.estagio}</b>`);
  if(state.mov && MOV[state.mov])partes.push(`Movim.: <b>${MOV[state.mov].label}</b>`);
  if(state.soParados)partes.push(`<b>só não trabalhados</b>`);
  document.getElementById('scopeTag').innerHTML = partes.length? partes.join(' · ') : `Escopo: <b>todos os cards</b>`;

  renderKPIs(main,m);
  renderMovimento(main,m);
  renderEvolucao(main);
  renderFunil(main,m);
  renderRanking(main,cards);
  renderMotivos(main,m);
  renderTabela(main,cards);
}

/* ----------------------- Boot ----------------------- */
initFiltros();
render();
</script>
